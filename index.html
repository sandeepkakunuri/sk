    :root {

      --accent-light: #fff5f0;

      --font-display: 'Space Grotesk', sans-serif;

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    canvas { display: block; }

    .loader {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    .loader.hidden { opacity: 0; visibility: hidden; }
    .loader-ring {
      width: 32px; height: 32px;
      border: 2px solid rgba(255,107,53,0.12);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .brand {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      pointer-events: none;
      gap: 0;
      opacity: 0;
      animation: pageIn 1.4s cubic-bezier(.25,.46,.45,.94) forwards;
      padding: 20px;
    }
    .brand::before {
      content: '';
      position: absolute;
      width: clamp(260px, 55vw, 600px);
      height: clamp(240px, 42vh, 440px);
      background: radial-gradient(ellipse, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.1) 45%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(-6px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .chimp-link {
      pointer-events: all;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      cursor: pointer;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--accent-light);
      border: 1px solid rgba(255,107,53,0.18);
      transition: all 0.4s cubic-bezier(.25,.46,.45,.94);
      outline: none;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 20px;
      opacity: 0;
      animation: elemIn 0.8s 0.3s ease forwards;
    }
    .chimp-link:hover {
      transform: scale(1.1);
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(255,107,53,0.3);
    }
    .chimp-link:hover svg path[data-face] { fill: var(--accent); }
    .chimp-link:hover svg path[data-body] { fill: #ffffff; }
    .chimp-link:active { transform: scale(1.04); }
    .chimp-link svg { width: 22px; height: 22px; pointer-events: none; }

    .brand-name {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(18px, 4.5vw, 40px);
      letter-spacing: 0.34em;
      color: var(--fg);
      text-transform: uppercase;
      line-height: 1;
      user-select: none;
      opacity: 0;
      animation: elemIn 0.8s 0.45s ease forwards;
      white-space: nowrap;
    }

    .brand-line {
      display: block;
      width: 48px; height: 1px;
      margin-top: 16px;
      margin-bottom: 16px;
      background: linear-gradient(90deg, transparent, rgba(255,107,53,0.3), transparent);
      opacity: 0;
      animation: lineIn 0.8s 0.6s ease forwards;
    }
    @keyframes lineIn { from { opacity: 0; } to { opacity: 1; } }

    .status-wrap {
      pointer-events: none;
      opacity: 0;
      animation: elemIn 0.8s 0.72s ease forwards;
    }
    .status-btn {
      font-family: var(--font-ui);
      font-weight: 400;
      font-size: clamp(10px, 2.2vw, 11px);
      letter-spacing: 0.22em;
      text-transform: lowercase;
      color: var(--fg-muted);
      background: none; border: none; padding: 0;
      display: inline-flex; align-items: center; gap: 1px;
      cursor: default;
    }
    .loading-dots { display: inline-flex; margin-left: 2px; }
    .loading-dots span {
      display: inline-block; width: 3px; text-align: left;
      animation: dotPulse 1.4s infinite ease-in-out both;
      color: var(--fg-muted);
    }
    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
    .loading-dots span:nth-child(3) { animation-delay: 0s; }
    .loading-dots span:nth-child(4) { animation-delay: 0.16s; }
    @keyframes dotPulse { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }

    .enter-wrap {
      margin-top: 22px;
      pointer-events: all;
      opacity: 0;
      animation: elemIn 0.8s 0.85s ease forwards;
    }

      font-family: var(--font-ui); font-weight: 500;
      font-size: clamp(10px, 2.2vw, 11px);

      border: 1px solid rgba(255,107,53,0.18);
      border-radius: 50px;
      padding: 14px 28px;
      text-decoration: none; cursor: pointer;
      transition: all 0.4s cubic-bezier(.25,.46,.45,.94);
      outline: none; -webkit-tap-highlight-color: transparent;
      min-height: 44px;
    }
    .enter-btn:hover {
      background: var(--accent); color: #ffffff;
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(255,107,53,0.25);
    }
    .enter-btn:active { transform: translateY(0); transition-duration: 0.1s; }
    .enter-btn svg {
      width: 13px; height: 13px; pointer-events: none;
      transition: transform 0.35s ease, opacity 0.35s ease;
      opacity: 0.4; flex-shrink: 0;
    }
    .enter-btn:hover svg { transform: translateX(2px); opacity: 1; }

    @keyframes elemIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .touch-hint {
      position: fixed; bottom: 50px; left: 50%;
      transform: translateX(-50%); z-index: 10;
      opacity: 0; transition: opacity 1.5s ease; pointer-events: none;
    }
    .touch-hint.show { opacity: 0.3; }
    .touch-hint.fade { opacity: 0; }

    @media (max-width: 480px) {
      .brand-name { letter-spacing: 0.18em; }
      .chimp-link { width: 40px; height: 40px; margin-bottom: 16px; }
      .chimp-link svg { width: 19px; height: 19px; }
      .brand-line { margin-top: 12px; margin-bottom: 12px; }
      .enter-wrap { margin-top: 18px; }
      .enter-btn { padding: 12px 22px; gap: 8px; }
    }
    @media (max-width: 360px) {
      .brand-name { letter-spacing: 0.12em; }
      .chimp-link { width: 36px; height: 36px; margin-bottom: 14px; }
      .chimp-link svg { width: 17px; height: 17px; }
    }
    @media (max-height: 500px) {
      .chimp-link { margin-bottom: 10px; }
      .brand-line { margin-top: 8px; margin-bottom: 8px; width: 36px; }
      .enter-wrap { margin-top: 12px; }
      .enter-btn { padding: 10px 20px; min-height: 38px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>

      { name:'Crimson',   r:0.5,  dist:25,  speed:2.2,  rotSpd:0.030, rim:0xc0392b, glow:0xe74c3c, moons:0 },
      { name:'Kronos',    r:3.2,  dist:35,  speed:0.7,  rotSpd:0.040, rim:0xf1c40f, glow:0xf1c40f, ring:true, ringCol:0xd4ac0d, moons:3 },
      { name:'Violetta',  r:2.4,  dist:45,  speed:0.4,  rotSpd:0.035, rim:0x8e44ad, glow:0x9b59b6, ring:true, ringCol:0xbb8fce, moons:2 },
      { name:'Rosalia',   r:1.5,  dist:55,  speed:0.3,  rotSpd:0.020, rim:0xE91E63, glow:0xF48FB1, moons:0 },
      { name:'Cobalt',    r:2.0,  dist:65,  speed:0.25, rotSpd:0.015, rim:0x2196F3, glow:0x64B5F6, ring:true, ringCol:0xBBDEFB, moons:2 },
      { name:'Tealora',   r:1.8,  dist:78,  speed:0.2,  rotSpd:0.025, rim:0x16a085, glow:0x1abc9c, ring:true, ringCol:0x80CBC4, moons:1 },
      { name:'Abyssia',   r:2.8,  dist:92,  speed:0.1,  rotSpd:0.010, rim:0x004D40, glow:0x00897B, ring:true, ringCol:0xB2DFDB, moons:3 },
    ];
    const startAngles = PLANET_DEFS.map((_, i) => (i / PLANET_DEFS.length) * Math.PI * 2 + Math.random() * 0.5);

    const planets = [];
    PLANET_DEFS.forEach((cfg, idx) => {
      const grp = new THREE.Group();
      const mat = new THREE.ShaderMaterial({
        uniforms: {
          uRimColor:   { value: new THREE.Color(cfg.rim) },
          uRimPower:   { value: 2.5 + cfg.r * 0.3 },
          uTime:       { value: 0 },
          uNoiseScale: { value: 4 + Math.random() * 6 }
        },
        vertexShader: planetVert, fragmentShader: planetFrag
      });
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(Math.max(0.1, cfg.r), 64, 64), mat);
      grp.add(mesh);
      grp.add(new THREE.Mesh(
        new THREE.SphereGeometry(Math.max(0.1, cfg.r * 1.15), 32, 32),
        new THREE.ShaderMaterial({
          uniforms: { uGlowColor: { value: new THREE.Color(cfg.glow) }, uIntensity: { value: 0.5 } },
          vertexShader: glowVert, fragmentShader: glowFrag,
          transparent: true, side: THREE.BackSide, depthWrite: false
        })
      ));
      if (cfg.ring) {
        const inner = Math.max(0.1, cfg.r * 1.25);
        const outer = Math.max(inner + 0.1, cfg.r * 1.75);
        const ringMesh = new THREE.Mesh(
          new THREE.RingGeometry(inner, outer, 128),
          new THREE.ShaderMaterial({
            uniforms: { uRingColor: { value: new THREE.Color(cfg.ringCol) }, uRimColor: { value: new THREE.Color(cfg.rim) } },
            vertexShader: ringVert, fragmentShader: ringFrag,
            transparent: true, side: THREE.DoubleSide, depthWrite: false
          })
        );
        ringMesh.rotation.x = Math.PI * 0.42 + idx * 0.12;
        ringMesh.rotation.z = idx * 0.25;
        grp.add(ringMesh);
      }
      const orbitPts = [];
      for (let i = 0; i <= 256; i++) {
        const a = (i / 256) * Math.PI * 2;
        orbitPts.push(Math.cos(a) * cfg.dist, 0, Math.sin(a) * cfg.dist);
      }
      const orbitGeo = new THREE.BufferGeometry();
      orbitGeo.setAttribute('position', new THREE.Float32BufferAttribute(orbitPts, 3));
      scene.add(new THREE.Line(orbitGeo, new THREE.LineBasicMaterial({ color: 0xe0d8d2, transparent: true, opacity: 0.30 })));
      const angle = startAngles[idx];
      grp.position.x = Math.cos(angle) * cfg.dist;
      grp.position.z = Math.sin(angle) * cfg.dist;
      scene.add(grp);
      const moonData = [];
      for (let m = 0; m < (cfg.moons || 0); m++) {
        const mr = Math.max(0.05, cfg.r * 0.1 + Math.random() * cfg.r * 0.1);
        const md = cfg.r * 1.8 + m * cfg.r * 0.6;
        const mMat = new THREE.ShaderMaterial({
          uniforms: { uRimColor: { value: new THREE.Color(cfg.rim).multiplyScalar(0.5) }, uRimPower: { value: 2 }, uTime: { value: 0 }, uNoiseScale: { value: 8 } },
          vertexShader: planetVert, fragmentShader: planetFrag
        });
        const mMesh = new THREE.Mesh(new THREE.SphereGeometry(mr, 16, 16), mMat);
        grp.add(mMesh);
        moonData.push({ mesh: mMesh, mat: mMat, dist: md, speed: 1.5 + Math.random() * 2, angle: Math.random() * Math.PI * 2, tilt: (Math.random() - 0.5) * 0.5 });
      }
      planets.push({ group: grp, mesh, mat, cfg, angle, moons: moonData });
    });

    /* ── UFO ships ── */
    const ufoShips = [];
    for (let i = 0; i < 5; i++) {
      const ufo = new THREE.Group();
      ufo.add(new THREE.Mesh(
        new THREE.CylinderGeometry(1, 0.3, 0.3, 8),
        new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.2, metalness: 0.8 })
      ));
      const glass = new THREE.Mesh(
        new THREE.SphereGeometry(0.4, 8, 8),
        new THREE.MeshStandardMaterial({ color: 0x99ccff, roughness: 0.1, metalness: 0.9, transparent: true, opacity: 0.5 })
      );
      glass.position.y = 0.2;
      ufo.add(glass);
      const s = 0.4 + Math.random() * 0.6;
      ufo.scale.set(s, s, s);
      ufo.rotation.x = -0.2;
      const baseY = 20 + Math.random() * 60;
      ufo.position.set((Math.random() - 0.5) * 300, baseY, (Math.random() - 0.5) * 300);
      scene.add(ufo);
      ufoShips.push({ mesh: ufo, sx: (Math.random() - 0.5) * 0.4, sz: (Math.random() - 0.5) * 0.4, baseY, bob: Math.random() * Math.PI * 2 });
    }

    /* ── Dust ── */
    const dustCount = isMobile ? 800 : 2000;
    const dustGeo = new THREE.BufferGeometry();
    const dustPos = new Float32Array(dustCount * 3);
    for (let i = 0; i < dustCount; i++) {
      const d = 5 + Math.random() * 100, a = Math.random() * Math.PI * 2;
      dustPos[i*3] = Math.cos(a) * d;
      dustPos[i*3+1] = (Math.random() - 0.5) * 2;
      dustPos[i*3+2] = Math.sin(a) * d;
    }
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
    scene.add(new THREE.Points(dustGeo, new THREE.PointsMaterial({ color: 0x1a1a2e, size: 0.04, transparent: true, opacity: 0.06, sizeAttenuation: true, depthWrite: false })));

    /* ── Animation loop ── */
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      starUniforms.uTime.value = t;
      sunMat.uniforms.uTime.value = t;

      planets.forEach(p => {
        p.angle += p.cfg.speed * 0.003;
        p.group.position.x = Math.cos(p.angle) * p.cfg.dist;
        p.group.position.z = Math.sin(p.angle) * p.cfg.dist;
        p.mesh.rotation.y += p.cfg.rotSpd;
        p.mat.uniforms.uTime.value = t;
        p.moons.forEach(m => {
          m.angle += m.speed * 0.02;
          m.mesh.position.x = Math.cos(m.angle) * m.dist;
          m.mesh.position.y = Math.sin(m.angle) * m.dist * Math.sin(m.tilt);
          m.mesh.position.z = Math.sin(m.angle) * m.dist * Math.cos(m.tilt);
          m.mat.uniforms.uTime.value = t;
        });
      });

      ufoShips.forEach(u => {
        u.mesh.position.x += u.sx;
        u.mesh.position.z += u.sz;
        u.mesh.position.y = u.baseY + Math.sin(t * 0.8 + u.bob) * 2;
        if (u.mesh.position.x > 150)  u.sx *= -1;
        if (u.mesh.position.x < -150) u.sx *= -1;
        if (u.mesh.position.z > 150)  u.sz *= -1;
        if (u.mesh.position.z < -150) u.sz *= -1;
      });

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    addEventListener('visibilitychange', () => {
      if (document.hidden) renderer.dispose();
    });
  </script>
</body>
</html>
