.lb{position:fixed;inset:0;z-index:200;background:rgba(255,251,248,.92);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .4s ease,visibility .4s ease}
.lb.on{opacity:1;visibility:visible}
.lb-stage{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none}
.lb-stage img{max-width:90vw;max-height:80vh;border-radius:12px;box-shadow:0 30px 90px rgba(255,107,53,.15);cursor:grab;user-select:none;-webkit-user-drag:none;touch-action:none;transform-origin:center center}
.lb-stage img.dragging{cursor:grabbing}
.lb-controls{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;gap:6px;align-items:center;background:rgba(255,251,248,.85);border:1px solid rgba(255,107,53,.18);border-radius:50px;padding:8px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.lb-btn{width:40px;height:40px;border-radius:50%;border:none;background:transparent;color:#1a1a2e;font-size:18px;font-family:'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s ease;-webkit-tap-highlight-color:transparent}
.lb-btn:hover{background:rgba(255,107,53,.12);color:#ff6b35}
.lb-close{position:absolute;top:20px;right:20px;width:44px;height:44px;border-radius:50%;background:rgba(255,251,248,.85);border:1px solid rgba(255,107,53,.18);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s ease;-webkit-tap-highlight-color:transparent}
.lb-close:hover{background:#ff6b35;border-color:#ff6b35}
.lb-close svg{width:18px;height:18px;stroke:#1a1a2e;transition:stroke .3s ease}
.lb-close:hover svg{stroke:#fff}
@media(max-width:480px){.wr{padding:36px 12px 60px}.hd{margin-bottom:28px}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
